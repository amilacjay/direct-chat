# coturn TURN server configuration
# Used by the p2p-chat Docker Compose stack for WebRTC NAT traversal fallback

# Network
listening-port=3478
# Uncomment to also listen on TLS port:
# tls-listening-port=5349

# Realm must match what the backend sends in /rtc-config
realm=p2pchat

# HMAC-based time-limited credentials (generated per-session by the backend)
use-auth-secret
static-auth-secret=dev-turn-secret

# Fingerprint on all TURN messages (required for some clients)
fingerprint

# Relay port range for media
min-port=49152
max-port=65535

# Log to stdout (Docker picks it up)
no-stdout-log
syslog

# Don't require strict address families (improves compatibility)
no-multicast-peers

# Disable CLI (not needed in Docker)
no-cli

# Verbose logging for development (change to 0 for production)
verbose
