# Production overlay — adds Let's Encrypt HTTPS on top of docker-compose.yml.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# First-time cert issuance: run ./init-letsencrypt.sh once (see that script).
services:
  nginx:
    volumes:
      # Replace the baked-in HTTP config with the HTTPS one.
      - ./nginx/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificates + ACME challenge webroot (shared with the certbot service).
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Reload every 6h so renewed certificates are picked up without downtime.
    command: sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Attempt renewal twice a day (no-op until a cert is within 30 days of expiry).
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - internal
    restart: unless-stopped
