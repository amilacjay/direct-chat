server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker, its registration shim, and the manifest have STABLE names
    # (not content-hashed), so they must always be revalidated — otherwise a new
    # build never reaches clients without a manual cache clear. Exact-match
    # locations take precedence over the hashed-asset regex below.
    location = /sw.js                { add_header Cache-Control "no-cache"; }
    location = /registerSW.js        { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

    # Hashed build assets (app.[hash].js, etc.) are immutable — cache forever.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must always revalidate so it references the newest asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
