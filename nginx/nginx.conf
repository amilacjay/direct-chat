upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream minio {
    server minio:9000;
}

# Redirect HTTP to HTTPS in production
# Uncomment and configure for SSL:
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # For production with SSL, replace the above with:
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 10M;

    # --- API routes: proxy to backend ---
    location ~ ^/(auth|users|friends|photos|notifications|rtc-config) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- WebSocket: proxy to backend with upgrade headers ---
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # Keep WS connections alive
        proxy_send_timeout 3600s;
    }

    # --- Health check passthrough ---
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # --- Avatars: served from MinIO (bucket name == "avatars") ---
    location /avatars/ {
        proxy_pass http://minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend SPA (catch-all) ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
