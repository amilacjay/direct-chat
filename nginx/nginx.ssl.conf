upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream minio {
    server minio:9000;
}

# ---- HTTP: serve ACME challenge, redirect everything else to HTTPS ----
server {
    listen 80;
    server_name _;

    # Let's Encrypt webroot challenge (must stay on plain HTTP).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: the application ----
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Certs issued by certbot with --cert-name app (domain-agnostic path).
    ssl_certificate     /etc/letsencrypt/live/app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — tells browsers to always use HTTPS for this host for 1 year.
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 10M;

    # --- API routes: proxy to backend ---
    location ~ ^/(auth|users|friends|photos|notifications|rtc-config) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- WebSocket: proxy to backend with upgrade headers ---
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # Keep WS connections alive
        proxy_send_timeout 3600s;
    }

    # --- Health check passthrough ---
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # --- Avatars: served from MinIO (bucket name == "avatars") ---
    location /avatars/ {
        proxy_pass http://minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend SPA (catch-all) ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
